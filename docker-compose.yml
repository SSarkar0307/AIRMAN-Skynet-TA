services:
  postgres:
    image: postgres:16-alpine
    container_name: skynet-postgres
    environment:
      POSTGRES_DB: skynet
      POSTGRES_USER: skynet
      POSTGRES_PASSWORD: skynet
    ports:
      - "5432:5432"
    volumes:
      - skynet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skynet -d skynet"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skynet-api
    environment:
      DATABASE_URL: postgresql+psycopg://skynet:skynet@postgres:5432/skynet
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
      DATABASE_CONNECT_RETRIES: "10"
      DATABASE_CONNECT_RETRY_DELAY_SECONDS: "2"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  skynet_postgres_data:

